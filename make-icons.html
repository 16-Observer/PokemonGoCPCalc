<!DOCTYPE html>
<html>
<head>
  <title>Generate PWA Icons</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    canvas { border-radius: 24px; display: block; margin: 12px 0; }
    button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 4px; }
    button:hover { background: #1557b0; }
    .row { display: flex; align-items: center; gap: 16px; margin: 16px 0; }
    h2 { margin-top: 32px; }
  </style>
</head>
<body>
  <h1>catchiv.app — PWA Icon Generator</h1>
  <p>Click the buttons to download the icon files, then add them to your repo root.</p>

  <h2>192×192</h2>
  <div class="row">
    <canvas id="c192" width="192" height="192"></canvas>
    <button onclick="download('c192', 'icon-192.png')">Download icon-192.png</button>
  </div>

  <h2>512×512</h2>
  <div class="row">
    <canvas id="c512" width="512" height="512" style="width:128px;height:128px"></canvas>
    <button onclick="download('c512', 'icon-512.png')">Download icon-512.png</button>
  </div>

  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      const cx = s / 2, cy = s / 2, r = s / 2;

      // Background
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#1a73e8';
      ctx.fill();

      // Pokéball band
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, cy - s * 0.04, s, s * 0.08);

      // Center button
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.10, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.07, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();

      // IV text — clip to circle
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();

      ctx.fillStyle = 'white';
      ctx.font = `900 ${s * 0.42}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.letterSpacing = `-${s * 0.016}px`;
      ctx.fillText('IV', cx, cy + s * 0.04);
      ctx.restore();
    }

    ['c192', 'c512'].forEach(id => drawIcon(document.getElementById(id)));

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const a = document.createElement('a');
      a.download = filename;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
