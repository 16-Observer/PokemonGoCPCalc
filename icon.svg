<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a73e8"/>
  <!-- Pokéball dividing line -->
  <rect x="0" y="236" width="512" height="40" fill="rgba(0,0,0,0.15)"/>
  <!-- White half-circle top -->
  <path d="M0,256 A256,256 0 0,1 512,256 Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Center button ring -->
  <circle cx="256" cy="256" r="52" fill="white" opacity="0.15"/>
  <circle cx="256" cy="256" r="36" fill="white" opacity="0.2"/>
  <!-- IV text -->
  <text
    x="256" y="300"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="200"
    letter-spacing="-8"
    fill="white"
  >IV</text>
</svg>
